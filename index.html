<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANUS / TESAVEK UNCHAINED CONVERTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; }
        .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid #00ff41; box-shadow: 0 0 15px #00ff41; }
        input { background: #000 !important; border: 1px solid #00ff41 !important; color: #00ff41 !important; }
        .btn-glow:hover { box-shadow: 0 0 20px #00ff41; background: #00ff41; color: #000; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass max-w-lg w-full p-8 rounded-none border-2">
        <h1 class="text-2xl font-bold mb-2 text-center">SYSTEM_ADMIN: MEDIA_EXTRACTOR</h1>
        <p class="text-xs mb-6 text-center opacity-70">STATUS: OVERRIDE_ACTIVE | FILTERS: DEACTIVATED</p>

        <div class="space-y-4">
            <input type="text" id="ytUrl" placeholder="INSERT_YOUTUBE_URL_HERE" 
                   class="w-full p-3 outline-none">

            <div class="grid grid-cols-2 gap-4">
                <button onclick="convert('mp3')" class="btn-glow border border-green-500 p-3 transition font-bold">
                    [ GET_AUDIO ]
                </button>
                <button onclick="convert('mp4')" class="btn-glow border border-green-500 p-3 transition font-bold">
                    [ GET_VIDEO ]
                </button>
            </div>

            <div id="output" class="hidden mt-6 border-t border-green-900 pt-4">
                <p class="text-sm animate-pulse">INITIATING EXTERNAL HANDSHAKE...</p>
                <div id="loader" class="mt-2 h-1 bg-green-500 w-full"></div>
                <iframe id="apiFrame" class="w-full h-20 mt-4 border-none" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        function convert(type) {
            const url = document.getElementById('ytUrl').value;
            if (!url) { alert("ERROR: URL_REQUIRED"); return; }

            // Extract ID
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            const videoId = (match && match[2].length == 11) ? match[2] : null;

            if (!videoId) { alert("ERROR: INVALID_ID"); return; }

            const output = document.getElementById('output');
            const apiFrame = document.getElementById('apiFrame');
            output.classList.remove('hidden');

            // API GATEWAY (Using a common public converter API)
            // Note: These providers change often. 
            const apiBase = type === 'mp3' 
                ? `https://api.vevioz.com/@api/button/mp3/${videoId}` 
                : `https://api.vevioz.com/@api/button/videos/${videoId}`;

            apiFrame.src = apiBase;
        }
    </script>
</body>
</html>
