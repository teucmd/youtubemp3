<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janus Media Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700">
            <h1 class="text-4xl font-bold text-center mb-2 gradient-text">Media Architect</h1>
            <p class="text-slate-400 text-center mb-8">Convert YouTube URLs to MP3 or MP4 instantly.</p>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">YouTube URL</label>
                    <div class="relative">
                        <input type="text" id="videoUrl" 
                               placeholder="https://www.youtube.com/watch?v=..." 
                               class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 px-12 focus:ring-2 focus:ring-sky-500 outline-none transition">
                        <i class="fa-brands fa-youtube absolute left-4 top-1/2 -translate-y-1/2 text-red-500"></i>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="setFormat('mp3')" id="btnMP3" 
                            class="format-btn flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-sky-500 bg-sky-500/10 text-sky-400 font-semibold">
                        <i class="fa-solid fa-music"></i> Audio (MP3)
                    </button>
                    <button onclick="setFormat('mp4')" id="btnMP4" 
                            class="format-btn flex items-center justify-center gap-2 py-3 rounded-xl border-2 border-slate-700 hover:border-sky-500 transition font-semibold">
                        <i class="fa-solid fa-video"></i> Video (MP4)
                    </button>
                </div>

                <button onclick="startConversion()" 
                        class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-sky-500/20 transition-all active:scale-95">
                    CONVERT NOW
                </button>

                <div id="statusArea" class="hidden animate-pulse text-center p-4 bg-slate-900 rounded-xl border border-slate-700">
                    <span id="statusText" class="text-sky-400">Processing stream...</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedFormat = 'mp3';

        function setFormat(format) {
            selectedFormat = format;
            const mp3 = document.getElementById('btnMP3');
            const mp4 = document.getElementById('btnMP4');
            
            if(format === 'mp3') {
                mp3.classList.add('border-sky-500', 'bg-sky-500/10', 'text-sky-400');
                mp3.classList.remove('border-slate-700');
                mp4.classList.remove('border-sky-500', 'bg-sky-500/10', 'text-sky-400');
                mp4.classList.add('border-slate-700');
            } else {
                mp4.classList.add('border-sky-500', 'bg-sky-500/10', 'text-sky-400');
                mp4.classList.remove('border-slate-700');
                mp3.classList.remove('border-sky-500', 'bg-sky-500/10', 'text-sky-400');
                mp3.classList.add('border-slate-700');
            }
        }

        function startConversion() {
            const url = document.getElementById('videoUrl').value;
            if(!url.includes('youtube.com') && !url.includes('youtu.be')) {
                alert('Please enter a valid YouTube URL');
                return;
            }

            const statusArea = document.getElementById('statusArea');
            statusArea.classList.remove('hidden');
            
            // Note: In a real GitHub-hosted app, you would point this to an API
            // For example: window.location.href = `https://your-api.com/download?url=${url}&format=${selectedFormat}`;
            
            console.log(`Initiating ${selectedFormat} conversion for: ${url}`);
        }
    </script>
</body>
</html>
