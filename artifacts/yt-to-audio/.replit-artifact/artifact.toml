kind = "web"
previewPath = "/"
title = "YT to Audio Converter"
version = "1.0.0"
id = "artifacts/yt-to-audio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23596
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/yt-to-audio run dev"

[services.env]
PORT = "23596"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/yt-to-audio", "run", "build"]
publicDir = "artifacts/yt-to-audio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
